<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API 课程助教</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"><i data-lucide="graduation-cap"></i></div>
          <div>
            <h1>API 课程助教</h1>
            <p>课件教学 · 作业解题 · 期末复习</p>
          </div>
        </div>

        <form id="course-form" class="course-form">
          <label for="course-name">当前科目</label>
          <div class="inline-input">
            <input id="course-name" placeholder="如 材料力学" autocomplete="off" />
            <button type="submit" class="icon-button" title="新建科目" aria-label="新建科目"><i data-lucide="plus"></i></button>
          </div>
        </form>
        <nav id="course-list" class="course-list" aria-label="科目列表"></nav>

        <section class="side-section">
          <div class="section-heading">
            <h2>资料库</h2>
            <span id="material-count">0</span>
          </div>
          <form id="material-form" class="material-form">
            <input id="material-input" type="file" multiple accept=".pptx,.pdf,.png,.jpg,.jpeg,.webp,.txt,.md" />
            <label for="material-input" class="upload-target">
              <i data-lucide="paperclip"></i>
              <span>选择课件、PDF、图片或文本</span>
            </label>
            <button class="primary-button" type="submit"><i data-lucide="upload-cloud"></i>导入资料</button>
          </form>
          <div id="material-list" class="material-list empty-state">还没有资料。</div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p id="api-state-label" class="eyebrow">检查 API 配置</p>
            <h2 id="course-title">我的课程</h2>
          </div>
          <button id="settings-toggle" class="secondary-button" type="button"><i data-lucide="settings"></i>设置</button>
        </header>

        <section id="setup-alert" class="setup-alert" hidden>
          <i data-lucide="plug-zap"></i>
          <div>
            <strong>先配置 API 才能使用助教</strong>
            <p>这个版本不再提供本地假答案。请填写 Base URL、API Key 并选择模型后测试连接。</p>
          </div>
        </section>

        <section id="settings-panel" class="settings-panel" hidden>
          <form id="settings-form" class="settings-grid">
            <label>
              API Base URL
              <input id="api-base-url" placeholder="https://api.openai.com/v1" autocomplete="off" />
            </label>
            <label>
              模型
              <div class="model-row">
                <select id="api-model"></select>
                <button id="refresh-models" class="secondary-button" type="button"><i data-lucide="refresh-cw"></i>检测</button>
              </div>
            </label>
            <label>
              API Key
              <input id="api-key" type="password" placeholder="留空表示不修改已保存的 key" autocomplete="off" />
            </label>
            <label class="check-label"><input id="clear-api-key" type="checkbox" />清除已保存的 API Key</label>
            <div class="settings-actions">
              <button id="test-api" class="secondary-button" type="button"><i data-lucide="plug"></i>测试连接</button>
              <button class="primary-button" type="submit"><i data-lucide="save"></i>保存</button>
            </div>
            <p id="settings-status" class="status-note">API Key 保存在用户目录，不写入项目数据库。</p>
          </form>
        </section>

        <section class="intent-row" aria-label="快捷任务">
          <button class="intent-button active" data-intent="teach_materials" type="button"><i data-lucide="book-open-check"></i><span>从 0 教课件</span></button>
          <button class="intent-button" data-intent="solve_homework" type="button"><i data-lucide="calculator"></i><span>解析作业图/PDF</span></button>
          <button class="intent-button" data-intent="final_review" type="button"><i data-lucide="calendar-check"></i><span>期末复习</span></button>
        </section>

        <section id="chat-log" class="chat-log" aria-live="polite"></section>

        <form id="chat-form" class="chat-form">
          <div id="chat-dropzone" class="chat-dropzone">
            <div id="chat-reference-list" class="chat-reference-list empty">
              <span>可把左侧资料拖到这里，指定本轮使用的文件。</span>
            </div>
            <textarea id="chat-input" placeholder="把需求直接发给助教：例如“把这份 PPT 从零教会我”“解这张作业图或 PDF”“根据所有资料给我期末冲刺计划”"></textarea>
          </div>
          <button id="send-message" class="primary-button" type="submit"><i data-lucide="send"></i>发送</button>
        </form>
      </main>

      <aside class="right-panel">
        <section class="panel-block">
          <div class="section-heading">
            <h2>复习档案</h2>
            <span id="artifact-count">0</span>
          </div>
          <div id="artifact-list" class="artifact-list empty-state">助教回答后会沉淀教学、解题和复习卡片。</div>
        </section>
        <section class="panel-block">
          <div class="section-heading">
            <h2>来源</h2>
            <span>当前回答</span>
          </div>
          <div id="source-list" class="source-list empty-state">回答中的资料引用会显示在这里。</div>
        </section>
      </aside>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/vendor/marked.umd.js"></script>
    <script src="/vendor/lucide.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
